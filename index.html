<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percorso Storico</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <section id="splash-screen" class="view active">
        <div class="overlay"></div>
        <h1 id="splash-titolo">Caricamento...</h1>
        <button id="btn-entra">ENTRA</button>
    </section>

    <section id="content-screen" class="view hidden">
        <div id="carousel" class="carousel-container"></div>
        
        <div class="audio-container">
            <audio id="audio-player" controls></audio>
        </div>
        
        <article id="storia-testo"></article>

        <div class="map-container">
            <h3>Dove sei:</h3>
            <img id="mappa-img" src="" alt="Mappa della tappa">
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
